<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover lets the page extend edge-to-edge on notched
         iPhones; without it, landscape is letterboxed with blank bars beside
         the notch and home indicator. Edge-anchored chrome keeps clear of
         those areas via env(safe-area-inset-*) rules in style.css. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <!-- Tints the mobile browser toolbar/status bar; matches theme_color in
         site.webmanifest. -->
    <meta name="theme-color" content="#000000" />
    <title>Hoeken's Anchor Alarm</title>

    <!-- Add-to-home-screen launch behaviour. iOS Safari ignores the
         manifest's `display: standalone`, so these meta tags are what make the
         home-screen icon open full-screen (no Safari chrome). Status bar style
         is `black-translucent` so the web view owns the entire window: with
         `black`, iOS frames the web view below the status bar and misplaces
         that frame after portrait/landscape rotation (white bars, offset touch
         targets — WebKit bug 191872). Translucent + viewport-fit=cover above
         sidesteps the framing entirely; #controlToolbar and the other
         edge-anchored chrome stay clear of the clock/notch via the
         env(safe-area-inset-*) rules in style.css. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Anchor Alarm" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicons/favicon-16x16.png"
    />
    <link rel="manifest" href="site.webmanifest" />

    <link rel="preload" href="icons/anchor.png" as="image" />
    <link rel="preload" href="icons/crosshair.png" as="image" />
    <link rel="preload" href="icons/anchor-transparent-100px.png" as="image" />
    <link rel="preload" href="leaflet/images/layers.png" as="image" />
    <link rel="preload" href="leaflet/images/layers-2x.png" as="image" />
    <link rel="preload" href="icons/ships/png/catamaran.png" as="image" />
    <link rel="preload" href="icons/ships/png/sailboat.png" as="image" />
    <link rel="preload" href="icons/ships/png/pleasure.png" as="image" />

    <!--
      Theme selection, run synchronously before first paint (no flash).
      B&G / Navico MFDs load embedded web apps with a `?mode=night` or
      `?mode=day` query param instead of honoring prefers-color-scheme, so
      catch that first; otherwise fall back to the OS preference. The chosen
      theme is applied as a class on <html>, which styles.css keys off of.
      The runtime toggle (see js/Theme.js) just flips this class; the choice
      is intentionally not persisted, so each load re-derives it.
    -->
    <script>
      (function () {
        var m = location.search.match(/[?&]mode=([^&]*)/);
        var mode = m ? decodeURIComponent(m[1]) : null;
        var theme = "dark";
        if (mode !== null) {
          theme = mode === "night" ? "dark" : "light";
        } else if (
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: light)").matches
        ) {
          theme = "light";
        }
        document.documentElement.className = theme;
      })();
    </script>

    <!--
      Chromium 69 (Navico/B&G MFDs) predates Object.fromEntries (Chrome 73),
      which vendored code in the app bundle calls during module evaluation.
      The build lowers syntax to chrome69 (see vite.config.js) but does not
      polyfill runtime APIs, so shim it here before the module script runs.
    -->
    <script>
      if (!Object.fromEntries) {
        Object.fromEntries = function (iterable) {
          var obj = {};
          Array.from(iterable).forEach(function (pair) {
            obj[pair[0]] = pair[1];
          });
          return obj;
        };
      }
    </script>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet.antimeridian.js"></script>
    <script src="leaflet/leaflet.BoatMarker.js"></script>
    <script src="leaflet/leaflet.hotline.js"></script>
    <script type="module" src="js/AnchorAlarm.js"></script>
  </head>

  <body>
    <div id="map_container">
      <div id="map"></div>
      <div id="mapAttribution"></div>
    </div>
  </body>
</html>
